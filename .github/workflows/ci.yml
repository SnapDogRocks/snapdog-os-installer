name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  RUSTFLAGS: -Dwarnings

jobs:
  conventional-commits:
    name: Conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Validate pull-request commits and title
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          ./scripts/check-conventional-commits.py --self-test
          enforcement_sha=$(git log --reverse --diff-filter=A --format=%H \
            "$BASE_SHA..$HEAD_SHA" -- scripts/check-conventional-commits.py | head -1)
          if [ -n "$enforcement_sha" ]; then
            BASE_SHA="$enforcement_sha^"
          fi
          ./scripts/check-conventional-commits.py --range "$BASE_SHA" "$HEAD_SHA"
          ./scripts/check-conventional-commits.py --message "$PR_TITLE"

  lint-test:
    name: Strict lint, test, policy, and packaging validation
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Linux build dependencies
        run: >-
          sudo apt-get update && sudo apt-get install --yes --no-install-recommends
          appstream desktop-file-utils libasound2-dev libudev-dev libwayland-dev libx11-xcb-dev
          libxkbcommon-dev libxkbcommon-x11-dev libxcursor-dev libxi-dev
          libxrandr-dev pkg-config shellcheck
      - name: Install Rust
        run: |
          rustup toolchain install --no-self-update
          rustup show active-toolchain
      - name: Cache Rust build data
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Cache security tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/bin/cargo-about
            ~/.cargo/bin/cargo-deny
          key: security-tools-about-0.9.0-audit-0.22.2-deny-0.20.2-${{ runner.os }}-${{ runner.arch }}
      - name: Install security tools
        run: |
          command -v cargo-about >/dev/null || cargo install --locked --version 0.9.0 --features cli cargo-about
          command -v cargo-audit >/dev/null || cargo install --locked --version 0.22.2 cargo-audit
          command -v cargo-deny >/dev/null || cargo install --locked --version 0.20.2 cargo-deny
      - name: Install pinned actionlint
        run: |
          install_dir="$RUNNER_TEMP/actionlint"
          mkdir -p "$install_dir"
          curl --proto '=https' --tlsv1.2 --location --fail --silent --show-error \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz \
            --output "$RUNNER_TEMP/actionlint.tar.gz"
          echo '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  '"$RUNNER_TEMP/actionlint.tar.gz" | sha256sum --check --status
          tar -xzf "$RUNNER_TEMP/actionlint.tar.gz" -C "$install_dir" actionlint
          echo "$install_dir" >> "$GITHUB_PATH"
      - name: Run repository checks
        run: ./scripts/check.sh

  windows-test:
    name: Test (windows-2025)
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install --no-self-update
          rustup show active-toolchain
      - name: Cache Rust build data
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run strict Windows checks
        run: |
          cargo fmt --check
          cargo clippy --locked --all-targets --all-features -- -D warnings
          cargo test --locked --all-features
