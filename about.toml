# cargo-about 0.9 policy for the exact multi-platform release dependency graph.
accepted = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "GPL-3.0-only",
  "ISC",
  "MIT",
  "OFL-1.1",
  "Ubuntu-font-1.0",
  "Unicode-3.0",
  "Zlib",
]
targets = [
  "aarch64-apple-darwin",
  "aarch64-pc-windows-msvc",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "x86_64-pc-windows-msvc",
  "x86_64-unknown-linux-gnu",
]
ignore-dev-dependencies = true
workarounds = ["cocoa", "ring", "rustix", "rustls"]
